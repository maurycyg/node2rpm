# On release creation: run tests, publish to npm, attach tarball to the GitHub release.
# See: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Publish

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - run: npm ci
      - run: npm test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - run: npm ci
      - run: npm run build
      - run: npm pack

      - name: Publish to npm (Trusted Publisher / OIDC)
        run: npm publish --provenance --access public --registry https://registry.npmjs.org

      - name: Attach tarball to release
        run: gh release upload "${{ github.event.release.tag_name }}" *.tgz --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
